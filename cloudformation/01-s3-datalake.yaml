AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  S3 data lake buckets for the stock market analytics pipeline.
  Creates a data lake bucket (bronze/silver/gold prefixes) and an
  Athena query results bucket. Includes lifecycle rules and blocks
  all public access.

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - dev
      - prod
    Default: dev
    Description: Deployment environment
  ProjectName:
    Type: String
    Default: stock-market-pipeline
    Description: Project name used in resource naming

Conditions:
  IsProd: !Equals [!Ref Environment, prod]

Resources:
  DataLakeBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: !If [IsProd, Retain, Delete]
    UpdateReplacePolicy: !If [IsProd, Retain, Delete]
    Properties:
      BucketName: !Sub '${ProjectName}-datalake-${Environment}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: BronzeExpiration
            Prefix: bronze/
            Status: Enabled
            ExpirationInDays: 30
          - Id: GoldTransitionToIA
            Prefix: gold/
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 90
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: !If [IsProd, Retain, Delete]
    UpdateReplacePolicy: !If [IsProd, Retain, Delete]
    Properties:
      BucketName: !Sub '${ProjectName}-athena-results-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireQueryResults
            Status: Enabled
            ExpirationInDays: 7
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

Outputs:
  DataLakeBucketName:
    Description: Name of the S3 data lake bucket
    Value: !Ref DataLakeBucket
    Export:
      Name: !Sub '${ProjectName}-${Environment}-DataLakeBucketName'
  DataLakeBucketArn:
    Description: ARN of the S3 data lake bucket
    Value: !GetAtt DataLakeBucket.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-DataLakeBucketArn'
  AthenaResultsBucketName:
    Description: Name of the Athena query results bucket
    Value: !Ref AthenaResultsBucket
    Export:
      Name: !Sub '${ProjectName}-${Environment}-AthenaResultsBucketName'
  AthenaResultsBucketArn:
    Description: ARN of the Athena query results bucket
    Value: !GetAtt AthenaResultsBucket.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-AthenaResultsBucketArn'
