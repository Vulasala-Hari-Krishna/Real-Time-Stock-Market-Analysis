name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Black check
        run: black --check src/ tests/

      - name: MyPy check
        run: mypy src/ --ignore-missing-imports

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/unit -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  cfn-lint:
    name: CloudFormation Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Validate templates
        run: cfn-lint cloudformation/*.yaml

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create dummy .env for compose validation
        run: cp .env.example .env

      - name: Verify Docker Compose config
        run: |
          if [ -f docker/docker-compose.yaml ]; then
            docker compose -f docker/docker-compose.yaml config --quiet
          else
            echo "docker-compose.yaml not yet created, skipping"
          fi

      - name: Build Docker images (dry run)
        run: |
          for dockerfile in docker/*/Dockerfile; do
            if [ -f "$dockerfile" ]; then
              dir=$(dirname "$dockerfile")
              service=$(basename "$dir")
              echo ">>> Building ${service}..."
              docker build -f "$dockerfile" -t "stock-pipeline-${service}:test" .
            fi
          done
          echo "No Dockerfiles found yet, skipping" || true
